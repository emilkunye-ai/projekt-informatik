<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bilder-Galerie</title>
    <style>
      body {font-family: Arial,sans-serif; background:#f4f4f4; margin:0; padding:20px;}
      .container {max-width:1100px; margin:0 auto;}
      h1 {text-align:center; color:#222;}
      .grid {display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:16px; margin-top:20px;}
      .card {background:white; border-radius:10px; overflow:hidden; box-shadow:0 0 10px rgba(0,0,0,0.12); text-align:center;}
      .card img {width:100%; height:230px; object-fit:cover; display:block;}
      .card p {margin:8px; color:#333; font-size:14px;}
      .back {display:inline-block; margin:20px auto 0; text-decoration:none; color:#007bff; border:1px solid #007bff; padding:8px 14px; border-radius:6px;}
      .back:hover {background:#007bff; color:white;}
    </style>
  </head>
  <body>
    <div class="container">
      <h1>PNG-Dateien im Projekt</h1>
      <div class="grid">
        <div class="card"><img src="Retro meets modern gaming setup.png" alt="Retro meets modern gaming setup" /><p>Retro meets modern gaming setup.png</p></div>
        <div class="card"><img src="früheres gaming.png" alt="früheres gaming" /><p>früheres gaming.png</p></div>
        <div class="card"><img src="heimkonsolen.png" alt="heimkonsolen" /><p>heimkonsolen.png</p></div>
        <div class="card"><img src="modernes gaming.png" alt="modernes gaming" /><p>modernes gaming.png</p></div>
      </div>
      <a class="back" href="index.html">Zurück zur Startseite</a>
    </div>
  </body>
</html>
