<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Standortkarte</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }
      
      .container {
        max-width: 900px;
        margin: 0 auto;
        background: white;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }
      
      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px 20px;
        text-align: center;
      }
      
      .header h1 {
        font-size: 28px;
        margin-bottom: 8px;
      }
      
      .header p {
        font-size: 14px;
        opacity: 0.9;
      }
      
      .content {
        padding: 20px;
      }
      
      .image-container {
        width: 100%;
        height: 450px;
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        background: #f0f0f0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      #bildAnzeige {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      
      .bildname-group {
        margin: 20px 0;
        padding: 20px;
        background: #f8f9fa;
        border-radius: 8px;
        border: 1px solid #e0e0e0;
      }
      
      .bildname-group label {
        display: block;
        font-weight: bold;
        color: #333;
        margin-bottom: 8px;
        font-size: 16px;
      }
      
      .bildname-group input {
        width: 100%;
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
        transition: border-color 0.3s ease;
      }
      
      .bildname-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }
      
      .button-group {
        display: flex;
        gap: 10px;
        margin-top: 20px;
        justify-content: center;
        flex-wrap: wrap;
      }
      
      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 600;
      }
      
      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }
      
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      }
      
      .btn-secondary {
        background: #f0f0f0;
        color: #333;
        border: 2px solid #ddd;
      }
      
      .btn-secondary:hover {
        background: #e0e0e0;
      }
      
      .info-box {
        background: #e7f3ff;
        border-left: 4px solid #667eea;
        padding: 15px;
        border-radius: 6px;
        margin-bottom: 20px;
        font-size: 14px;
        color: #333;
      }
      
      .back-link {
        display: inline-block;
        margin-top: 20px;
        text-decoration: none;
        color: white;
        background: #764ba2;
        padding: 10px 20px;
        border-radius: 6px;
        transition: background 0.3s ease;
      }
      
      .back-link:hover {
        background: #667eea;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🗺️ Standortkarte</h1>
        <p>Zeige denn Standort an</p>
      </div>
      
      <div class="content">
        
        <div class="image-container">
          <img id="bildAnzeige" src="Karte.png" alt="Standortkarte" />
        </div>
        
        <div style="text-align: center;">
          <a class="back-link" href="index.html">← Zurück zur Startseite</a>
        </div>
      </div>
    </div>
    
    <script>
    
    </script>
  </body>
</html>
