<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Informationen über Arbeiter</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background-image: url('mitarbeiterinfo.png');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: rgb(255, 255, 255);
        }
       
       .content {
         position: relative;
         top: 20px; /* etwas Abstand von oben */
         left: 0;
         width: 100%;
         color: white;
         text-align: center;
         text-shadow: 0 0 5px rgba(0,0,0,0.7);
       }
       .menu-button {
         position: absolute;
         top: 16px;
         right: 16px;
         width: 24px;
         height: 24px;
         display: flex;
         flex-direction: column;
         justify-content: space-between;
         cursor: pointer;
         z-index: 20;
       }
       .menu-button span {
         display: block;
         width: 100%;
         height: 4px;
         background: white;
         border-radius: 2px;
       }
       .controller-section {
         position: relative;
         margin-top: 300px; /* reduced space to prevent shifting */
         text-align: center;
         z-index: 10;
       }
       .controller-text {
         font-size: 18px;
         margin-bottom: 50px;
         font-weight: 500;
       }
       .btn-blue {
         background-color: #0066ff;
         color: rgb(255, 255, 255);
         padding: 10px 20px;
         border: none;
         border-radius: 4px;
         cursor: pointer;
         font-size: 16px;
         transition: background-color 0.3s ease;
       }
        .btn-blue:hover {
          background-color: #0052cc;
        font-family: Arial, sans-serif;
        background-color: #f0f0f0;
        margin: 0;
        padding: 20px;
      }
        .container {
          max-width: 1200px;
          margin: 0 auto;
          background-color: rgb(255, 255, 255);
          padding: 20px;
          box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .container {
          max-width: 1000px;
          margin: 0 auto;
          background-color: rgba(255, 255, 255, 0.9);
          padding: 20px;
          box-shadow: 0 0 10px rgba(0,0,0,0.1);
          border-radius: 12px;
        }
      h1 {
        text-align: center;
        color: #750303;
      }
      .workers-grid {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 20px;
      }
      .worker-card {
        width: 220px;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        background-color: #333;
        color: white;
        text-align: center;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        position: relative;
        text-decoration: none;
      }
      .worker-card:hover { transform: translateY(-8px); box-shadow: 0 10px 25px rgba(0,102,255,0.4); }
      .worker-card img {
        width: 100%;
        height: 70%;
        object-fit: cover;
      }
      .worker-card h3 {
        margin: 8px 0 4px;
        color: #66d9ff;
      }
      .worker-card .job {
        margin: 0 0 12px;
        font-size: 14px;
        color: #eee;
      }
      .back-link {
        display: block;
        margin: 20px auto 0;
        text-align: center;
        color: #007BFF;
        text-decoration: none;
        width: fit-content;
      }
      .back-link:hover { text-decoration: underline; }
       </style>
  </head>
  <body>
    <div class="container">
      <h1>Informationen über Arbeiter</h1>
      <div class="workers-grid">
        <a class="worker-card" href="arbeiter noura.html">
          <img src="noura.png" alt="Noura" />
          <h3>Noura</h3>
          <div class="job">Rundführung</div>
        </a>
        <a class="worker-card" href="arbeiter Olaf.html">
          <img src="olaf.png" alt="Olaf" />
          <h3>Olaf</h3>
          <div class="job">Rundführung</div>
        </a>
        <a class="worker-card" href="arbeiter carlos.html">
          <img src="carlos.png" alt="Carlos" />
          <h3>Carlos</h3>
          <div class="job">Empfang</div>
        </a>
        <a class="worker-card" href="arbeiter linh.html">
          <img src="linh.png" alt="Linh"/>
          <h3>Linh</h3>
          <div class="job">Empfang</div>
        </a>
        <a class="worker-card" href="arbeiter juri.html">
          <img src="Juri.png" alt="Juri"/>
          <h3>Juri</h3>
          <div class="job">Sicherheitsdienst</div>
        </a>
        <a class="worker-card" href="Putzkraft man.html">
          <img src="Putzkraft man.png" alt="Putzkraft" />
          <h3>Piet</h3>
          <div class="job">Putzkraft</div>
        </a>
        <a class="worker-card" href="putzkraft frau.html">
          <img src="Putzkraft frau.png" alt="Putzfrau"/>
          <h3>Ronja</h3>
          <div class="job">Putzkraft</div>
        </a>
        <a class="worker-card" href="museumsdirektorin.html">
          <img src="Museumsdirektorin.png" alt="Museumsdirektorin"/>
          <h3>Marlis</h3>
          <div class="job">Museumsdirektorin</div>
        </a>
      </div>
      <a class="back-link" href="index.html">Zurück zur Startseite</a>
    </div>
  </body>
</html>
